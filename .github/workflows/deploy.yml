name: Deploy Agents

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: readiq-agents
  IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/readiq/agents

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8001 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 3600 \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}" \
            --set-env-vars "LLM_MODEL=${{ secrets.LLM_MODEL }}" \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "EMBEDDING_PROVIDER=${{ secrets.EMBEDDING_PROVIDER }}" \
            --set-env-vars "EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL }}" \
            --set-env-vars "EMBEDDING_DIMENSIONS=${{ secrets.EMBEDDING_DIMENSIONS }}" \
            --set-env-vars "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" \
            --set-env-vars "SEARCH_PROVIDER=${{ secrets.SEARCH_PROVIDER }}" \
            --set-env-vars "MIN_SOURCES_PER_STANCE=${{ secrets.MIN_SOURCES_PER_STANCE }}" \
            --set-env-vars "MAX_SOURCES_PER_STANCE=${{ secrets.MAX_SOURCES_PER_STANCE }}"

      - name: Show Service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ secrets.GCP_REGION }} \
            --format "value(status.url)"