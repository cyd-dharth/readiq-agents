services:
  agents-worker:
    build: .
    volumes:
      - ./certs/Cloudflare_CA_Certificate.pem:/certs/cloudflare_ca.pem:ro
    entrypoint: ["sh", "-c"]
    command:
      - cat /certs/cloudflare_ca.pem >> /srv/.venv/lib/python3.13/site-packages/certifi/cacert.pem && exec python run_agent.py
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - readiq-backend_default

  agents-api:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./certs/Cloudflare_CA_Certificate.pem:/certs/cloudflare_ca.pem:ro
    entrypoint: ["sh", "-c"]
    command:
      - cat /certs/cloudflare_ca.pem >> /srv/.venv/lib/python3.13/site-packages/certifi/cacert.pem && exec python run_api.py
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - readiq-backend_default

networks:
  readiq-backend_default:
    external: true

# Requires readiq-backend's docker compose (Postgres, Redis) already running.
# docker compose up -d  [To run both the worker and the internal chat API]
